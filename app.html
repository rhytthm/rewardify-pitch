<style>
  /* Mobile-first responsive scaling for the phone frame.
     Default desktop CSS renders 2 phones at 402x874 each (804px + 28px gap).
     On narrow screens we scale .frames to fit the viewport. */
  html, body { background: #E8E4DA; }
  body { overscroll-behavior: none; }
  .stage {
    /* allow flex layout to determine size, then we scale the inner .frames */
    overflow: hidden;
  }
  /* JS-driven scale variable; fallback to 1 if JS hasn't run yet */
  .frames {
    transform: scale(var(--fit-scale, 1));
    transform-origin: center center;
  }
  /* On mobile, hide the dual-phone layout: only show the active role */
  @media (max-width: 720px) {
    .frames { gap: 0; }
    .view-switch {
      top: max(8px, env(safe-area-inset-top, 0px));
    }
  }
  /* Fix the view-switch to remain tappable above safe areas */
  @supports (padding: max(0px)) {
    .view-switch { top: max(14px, env(safe-area-inset-top, 14px)); }
  }
</style>

<script>
/* Mobile fit-to-viewport scaler.
   Computes the largest scale that lets the .frames element fit the viewport,
   accounting for the view-switch chrome at top and a small safety margin.
   Updates a CSS variable; CSS handles the rest. */
(function () {
  function fit() {
    var stage = document.querySelector('.stage');
    var frames = document.querySelector('.frames');
    if (!stage || !frames) return;
    // Reset transform to measure natural size
    var prev = frames.style.transform;
    frames.style.transform = 'scale(1)';
    var w = frames.offsetWidth, h = frames.offsetHeight;
    frames.style.transform = prev;
    if (!w || !h) return;
    // Available area: viewport minus chrome (view-switch ~70px) and safe areas
    var chromeTop = 80;
    var marginX = 16, marginBottom = 16;
    var availW = window.innerWidth - marginX * 2;
    var availH = window.innerHeight - chromeTop - marginBottom;
    var scale = Math.min(availW / w, availH / h, 1);
    // On wide screens we cap at 1 (don't enlarge); on mobile this scales down.
    document.documentElement.style.setProperty('--fit-scale', scale.toFixed(4));
  }
  // Run after first paint so React has mounted .frames
  if (document.readyState === 'complete') setTimeout(fit, 60);
  else window.addEventListener('load', function () { setTimeout(fit, 60); });
  // Also re-run when React likely finishes (covers Babel async)
  setTimeout(fit, 400);
  setTimeout(fit, 1200);
  setTimeout(fit, 2500);
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  // Observe DOM mutations on root in case frames mount later
  var mo = new MutationObserver(function () { fit(); });
  mo.observe(document.body, { childList: true, subtree: true });
  setTimeout(function () { mo.disconnect(); }, 5000);
})();
</script>
